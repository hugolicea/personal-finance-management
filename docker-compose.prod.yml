# Production Override Configuration
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up
# This file overrides base configuration with production-specific settings

services:
  postgres:
    image: postgres:15-alpine  # Lighter image for production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  mysql:
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-me}
      - DEBUG=False
      # Set to True only when HTTPS is properly configured (not for local HTTP testing)
      - SECURE_SSL_REDIRECT=${SECURE_SSL_REDIRECT:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      - static_volume:/app/staticfiles  # Static files only (no hot reload)
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s = socket.socket(); s.connect(('localhost', 8000)); s.close()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Nginx: Backend reverse proxy (production only)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/backend.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles:ro  # Mount static files read-only
    depends_on:
      - backend
    networks:
      - personal_finance_network
    profiles:
      - postgres
      - mysql
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
